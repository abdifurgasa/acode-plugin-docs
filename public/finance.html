<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins', sans-serif;
  background:#f5f6fa;
}

.container{
  padding:20px;
}

h2{
  margin-bottom:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
  padding:10px;
  border:none;
  background:#0be881;
  color:white;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

  <h2>💰 Finance Dashboard</h2>

  <h3>Unpaid Bills</h3>
  <div id="billList"></div>

</div>

<!-- JS -->
<script type="module">

import { db } from "./js/core/firebase.js";
import { payWorkerBills } from "./services/financeService.js";

import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* LOAD BILLING DATA */
onSnapshot(collection(db,"billing"), snap => {

  const container = document.getElementById("billList");
  container.innerHTML = "";

  let workerTotals = {};

  snap.forEach(doc => {

    const data = doc.data();

    // only unpaid bills
    if(data.status !== "unpaid") return;

    if(!workerTotals[data.worker]){
      workerTotals[data.worker] = 0;
    }

    workerTotals[data.worker] += Number(data.amount);

  });

  // render workers
  for(let worker in workerTotals){

    container.innerHTML += `
      <div class="card">
        <h4>${worker}</h4>
        <p>Total: ${workerTotals[worker]}</p>
        <button onclick="payNow('${worker}')">Pay</button>
      </div>
    `;
  }

});

/* PAY FUNCTION (CONNECTED TO SERVICE) */
window.payNow = async (workerEmail) => {

  const amount = await payWorkerBills(workerEmail);

  alert("Payment successful: " + amount);

};

</script>

</body>
</html>
