<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worker Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  display:flex;
  background:#f5f6fa;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#1e272e;
  color:white;
  padding:20px;
}

.sidebar h2{
  color:#ffdd59;
  margin-bottom:30px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  background:#2f3640;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.sidebar button:hover{
  background:#485460;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.logout{
  background:red;
  border:none;
  padding:10px 15px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h3{
  color:gray;
  font-size:14px;
}

.card p{
  font-size:22px;
  font-weight:bold;
}

/* ORDER FORM */
.form{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

input, select{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:1px solid #ddd;
  border-radius:6px;
}

button.add{
  width:100%;
  padding:12px;
  border:none;
  background:#1e90ff;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* ORDERS */
.orders{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.order-card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.status{
  padding:5px 10px;
  border-radius:6px;
  color:white;
  font-size:12px;
}

.pending{ background:orange; }
.processing{ background:blue; }
.done{ background:green; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>👷 Worker</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('create')">Create Order</button>
  <button onclick="show('orders')">My Orders</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>Worker Dashboard</h2>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- STATS -->
  <div class="cards">
    <div class="card">
      <h3>My Orders</h3>
      <p id="myOrders">0</p>
    </div>

    <div class="card">
      <h3>Pending</h3>
      <p id="pending">0</p>
    </div>

    <div class="card">
      <h3>Done</h3>
      <p id="done">0</p>
    </div>
  </div>

  <!-- CREATE ORDER -->
  <div id="create" class="form">

    <h3>Create Order</h3>

    <select id="type">
      <option value="food">Food</option>
      <option value="drink">Drink</option>
      <option value="room">Room</option>
    </select>

    <input type="text" id="item" placeholder="Item name">
    <input type="number" id="price" placeholder="Price">

    <button class="add" onclick="addOrder()">Send Order</button>

  </div>

  <!-- ORDERS -->
  <div id="orders" class="orders"></div>

</div>

<!-- JS -->
<script type="module">

import { db, auth } from "./js/firebase.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  collection,
  addDoc,
  onSnapshot,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let currentUser = null;

/* AUTH */
auth.onAuthStateChanged(user => {
  if(!user){
    location.href = "login.html";
  } else {
    currentUser = user.email;
    loadOrders();
  }
});

/* LOGOUT */
window.logout = () => {
  signOut(auth).then(()=> location.href="login.html");
};

/* ADD ORDER */
window.addOrder = async () => {

  const type = document.getElementById("type").value;
  const item = document.getElementById("item").value;
  const price = document.getElementById("price").value;

  await addDoc(collection(db,"orders"), {
    type,
    item,
    price,
    status:"pending",
    createdBy: currentUser,
    createdAt: new Date()
  });

};

/* LOAD ORDERS */
function loadOrders(){

  const q = query(collection(db,"orders"), where("createdBy","==",currentUser));

  onSnapshot(q, snap => {

    const container = document.getElementById("orders");
    container.innerHTML = "";

    let pending=0, done=0;

    snap.forEach(d => {

      const data = d.data();

      if(data.status === "pending") pending++;
      if(data.status === "done") done++;

      container.innerHTML += `
        <div class="order-card">
          <h4>${data.item}</h4>
          <p>${data.type}</p>

          <span class="status ${data.status}">
            ${data.status}
          </span>
        </div>
      `;
    });

    document.getElementById("myOrders").innerText = snap.size;
    document.getElementById("pending").innerText = pending;
    document.getElementById("done").innerText = done;

  });

}

/* SIMPLE NAV */
window.show = (id) => {
  document.querySelectorAll(".form, .orders").forEach(e=>{
    e.style.display="none";
  });

  if(id === "create") document.querySelector(".form").style.display="block";
  if(id === "orders") document.querySelector(".orders").style.display="grid";
};

</script>

</body>
</html>
