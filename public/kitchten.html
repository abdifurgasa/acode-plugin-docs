<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins', sans-serif;
}

body{
  display:flex;
  background:#f5f6fa;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#1e272e;
  color:white;
  padding:20px;
}

.sidebar h2{
  color:#ffd32a;
  margin-bottom:30px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:none;
  background:#2f3640;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.sidebar button:hover{
  background:#485460;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.logout{
  background:red;
  border:none;
  padding:10px 15px;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.card h3{
  color:gray;
  font-size:14px;
}

.card p{
  font-size:22px;
  font-weight:bold;
}

/* ORDER LIST */
.orders{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.order-card{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.order-card h4{
  margin-bottom:10px;
}

.status{
  padding:5px 10px;
  border-radius:6px;
  color:white;
  font-size:12px;
}

.pending{ background:orange; }
.processing{ background:blue; }
.done{ background:green; }

button.action{
  margin-top:10px;
  padding:8px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
}

.accept{ background:blue; }
.finish{ background:green; }

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🍳 Kitchen</h2>
  <button onclick="show('orders')">Orders</button>
  <button onclick="show('history')">History</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h2>Kitchen Dashboard</h2>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- STATS -->
  <div class="cards">
    <div class="card">
      <h3>Pending</h3>
      <p id="pendingCount">0</p>
    </div>

    <div class="card">
      <h3>Processing</h3>
      <p id="processingCount">0</p>
    </div>

    <div class="card">
      <h3>Completed</h3>
      <p id="doneCount">0</p>
    </div>
  </div>

  <!-- ORDERS -->
  <div id="orders" class="orders"></div>

</div>

<!-- JS -->
<script type="module">

import { db, auth } from "./js/firebase.js";
import { signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  collection,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* LOGOUT */
window.logout = () => {
  signOut(auth).then(()=> location.href="login.html");
};

/* LOAD ORDERS */
onSnapshot(collection(db,"orders"), snap => {

  const container = document.getElementById("orders");
  container.innerHTML = "";

  let pending=0, processing=0, done=0;

  snap.forEach(d => {

    const data = d.data();

    // Only FOOD orders
    if(data.type !== "food") return;

    if(data.status === "pending") pending++;
    if(data.status === "processing") processing++;
    if(data.status === "done") done++;

    container.innerHTML += `
      <div class="order-card">
        <h4>${data.item}</h4>

        <span class="status ${data.status}">
          ${data.status}
        </span>

        <br>

        ${
          data.status === "pending"
          ? `<button class="action accept" onclick="acceptOrder('${d.id}')">Accept</button>`
          : ""
        }

        ${
          data.status === "processing"
          ? `<button class="action finish" onclick="finishOrder('${d.id}')">Done</button>`
          : ""
        }

      </div>
    `;
  });

  document.getElementById("pendingCount").innerText = pending;
  document.getElementById("processingCount").innerText = processing;
  document.getElementById("doneCount").innerText = done;

});

/* ACTIONS */
window.acceptOrder = async (id) => {
  await updateDoc(doc(db,"orders",id), {
    status:"processing"
  });
};

window.finishOrder = async (id) => {
  await updateDoc(doc(db,"orders",id), {
    status:"done"
  });
};

</script>

</body>
</html>
